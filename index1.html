<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МАГАЗИН ДЛЯ ИГРУШЕК</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <section class="top-bar">
      <div class="container">
        <div class="btn-row">
          <button class="btn-lang" data-lang="ru">RUS</button>
          <button class="btn-lang" data-lang="chi">CHI</button>
          <button class="btn-lang" data-lang="en">ENG</button>
          <button class="btn-lang" id="fontSizeToggle">
            <span><img src="img/Group 684.svg" /></span>
          </button>
          <a href="magazine2.html" class="btn-main">КАТАЛОГ</a>
          <a href="new4.html" class="btn-main">НОВОСТИ</a>
        </div>
      </div>
    </section>
    <section class="gallery-block">
      <div class="gallery-container">
        <div class="gallery-item gallery-left">
          <img
            src="img/Group 770.svg"
            alt="Изображение 1"
            class="gallery-img"
          />
        </div>
        <div class="gallery-item gallery-right">
          <img src="img/Group 740.svg" class="gallery-img" />
        </div>
        <div class="gallery-item gallery-bottom">
          <img src="img/Group 767.svg" class="gallery-img" />
        </div>
      </div>
    </section>

    <section class="content-section">
      <div class="container">
        <h1 id="mainTitle">Добро пожаловать!</h1>
        <p id="mainText">
          Добро пожаловать на наш сайт, где игрушка может заказать себе товар и
          мы его доставим!
        </p>
        <a href="index2.html" class="btn-main btn-secondary">Перейти</a>
      </div>
    </section>
    <section class="links-section">
      <div class="links-container">
        <h2 class="links-title">КАТАЛОГ</h2>
        <div class="links-grid">
          <a href="index6.html" target="_blank" class="link-btn">НОВИНКИ</a>
          <a href="index6.html" target="_blank" class="link-btn">СКИДКИ</a>
          <a href="index6.html" target="_blank" class="link-btn"
            >ТОВАРЫ ДЛЯ ДОМА</a
          >
          <a href="index6.html" target="_blank" class="link-btn">канцтовары</a>
          <a href="index6.html" target="_blank" class="link-btn">книги</a>
          <a href="index6.html" target="_blank" class="link-btn"
            >наша команда</a
          >
          <a href="index6.html" target="_blank" class="link-btn">новости</a>
          <a href="index6.html" target="_blank" class="link-btn">мерч</a>
          <a href="index6.html" target="_blank" class="link-btn">косметика</a>
          <a href="index6.html" target="_blank" class="link-btn">одежда </a>
        </div>
      </div>
    </section>
    <section class="comments-section">
      <div class="comments-container">
        <h2 class="comments-title">КОММЕНТАРИИ</h2>
        <div class="comments-form">
          <input
            type="text"
            id="commentName"
            class="comment-input"
            placeholder="Ваше имя"
            maxlength="50"
          />
          <input
            type="text"
            id="commentText"
            class="comment-input"
            placeholder="Напишите комментарий..."
            maxlength="200"
          />
          <button class="comment-btn" id="addCommentBtn">ОТПРАВИТЬ</button>
        </div>
        <div class="comments-list" id="commentsList"></div>
      </div>
    </section>

    <script src="js/script.js"></script>
  </body>
</html>
