<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МАГАЗИН ДЛЯ ИГРУШЕК</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <section class="cards-section">
      <div class="cards-container">
        <div class="card-item">
          <div class="card-image">
            <img src="img/pu1.svg" alt="Изображение 1" />
          </div>
          <div class="card-content">
            <h3 class="card-title">МОДУЛЬ 4</h3>
            <p class="card-text">
              Это описание для первой карточки. Здесь может быть любой текст.
            </p>
          </div>
        </div>

        <div class="card-item card-reverse">
          <div class="card-image">
            <img src="img/pu2.svg" alt="Изображение 2" />
          </div>
          <div class="card-content">
            <h3 class="card-title">МОДУЛЬ 3</h3>
            <p class="card-text">
              Это описание для второй карточки. Текст может быть разным.
            </p>
          </div>
        </div>

        <div class="card-item">
          <div class="card-image">
            <img src="img/card3.svg" alt="Изображение 3" />
          </div>
          <div class="card-content">
            <h3 class="card-title">МОДУЛЬ 2</h3>
            <p class="card-text">
              Это описание для третьей карточки. Добавьте свой текст.
            </p>
          </div>
        </div>

        <div class="card-item card-reverse">
          <div class="card-image">
            <img src="img/card4.svg" alt="Изображение 4" />
          </div>
          <div class="card-content">
            <h3 class="card-title">МОДУЛЬ 1</h3>
            <p class="card-text">
              Это описание для четвертой карточки. Здесь можно писать что
              угодно.
            </p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
